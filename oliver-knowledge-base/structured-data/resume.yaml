projects:
  - name: "A Very Big Video Reasoning Suite (VBVR)"
    role: "Co-author"
    start_date: "2026-02"
    end_date: "2026-02"
    description: |
      Large-scale video reasoning suite introducing a 200-task taxonomy-aligned dataset and
      a reproducible rule-based benchmark framework for model evaluation.
    highlights:
      - "2,015,000 images and 1,007,500 videos generated across 200 reasoning tasks."
      - "Includes 1,000,000 train and 7,500 test samples for scaling analysis."
      - "Shows early emergence of out-of-domain generalization while still below human performance."
    technologies: ["Video Reasoning", "Benchmarking", "Cognitive Taxonomy", "Distributed Data Pipeline"]
    links:
      paper: "https://arxiv.org/abs/2602.20159"
      website: "https://video-reason.com"
    markdown_link: "../projects/vbvr-a-very-big-video-reasoning-suite.md"

  - name: "Probing Perceptual Constancy in Large Vision-Language Models"
    role: "Co-author"
    start_date: "2025-02"
    end_date: "2025-02"
    description: |
      Benchmark study of perceptual constancy in VLMs across color, size, and shape domains
      using controlled cognitive experiments.
    highlights:
      - "Evaluated 155 VLMs on 236 experiments."
      - "Shape constancy outperformed color and size (0.723 vs 0.588 and 0.584)."
      - "Observed positive scaling relationship between model size and constancy performance."
    technologies: ["Vision-Language Models", "Benchmark Design", "Statistical Analysis", "IRT"]
    links:
      paper: "https://arxiv.org/abs/2502.20173"
    markdown_link: "../projects/probing-perceptual-constancy-in-vlms.md"

